<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>スペースインベーダー</title>
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    min-height: 100%;
    background: #05070c;
    color: #fff;
    font-family: Arial, "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
    overflow-x: hidden;
  }
  body {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 12px;
  }
  .game-wrap {
    width: min(100%, 920px);
    text-align: center;
  }
  h1 {
    margin: 4px 0 8px;
    font-size: clamp(24px, 5vw, 42px);
    letter-spacing: 2px;
    color: #7CFF7C;
    text-shadow: 0 0 12px #19ff19;
  }
  .hud {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
    margin-bottom: 8px;
    font-weight: bold;
    font-size: clamp(12px, 2.5vw, 18px);
  }
  .hud div {
    background: #111827;
    border: 1px solid #2f405e;
    border-radius: 8px;
    padding: 7px 4px;
  }
  .canvas-box {
    position: relative;
    width: 100%;
    background: #000;
    border: 3px solid #1f8bff;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 0 18px rgba(31,139,255,.6);
  }
  canvas {
    display: block;
    width: 100%;
    height: auto;
    background:
      radial-gradient(circle at 15% 20%, rgba(255,255,255,.22) 0 1px, transparent 2px),
      radial-gradient(circle at 70% 35%, rgba(255,255,255,.18) 0 1px, transparent 2px),
      radial-gradient(circle at 35% 65%, rgba(255,255,255,.16) 0 1px, transparent 2px),
      #02040a;
    touch-action: none;
  }
  .overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,.72);
    z-index: 5;
  }
  .panel {
    width: min(88%, 460px);
    padding: 24px;
    border: 2px solid #7CFF7C;
    border-radius: 14px;
    background: rgba(8,15,25,.95);
    box-shadow: 0 0 24px rgba(124,255,124,.35);
  }
  .panel h2 {
    margin: 0 0 10px;
    color: #7CFF7C;
    font-size: clamp(24px, 5vw, 40px);
  }
  .panel p {
    line-height: 1.6;
    margin: 8px 0 16px;
  }
  button {
    border: 0;
    border-radius: 12px;
    font-weight: bold;
    cursor: pointer;
    user-select: none;
  }
  #startBtn {
    padding: 14px 30px;
    font-size: 22px;
    background: #24d45a;
    color: #001405;
    box-shadow: 0 4px 0 #0a7b2d;
  }
  #startBtn:active { transform: translateY(3px); box-shadow: 0 1px 0 #0a7b2d; }

  .controls {
    display: grid;
    grid-template-columns: 1fr 1fr 1.2fr;
    gap: 10px;
    margin-top: 12px;
  }
  .control-btn {
    min-height: 68px;
    font-size: 28px;
    color: white;
    background: #1b2a44;
    border: 2px solid #3a5a8e;
    box-shadow: 0 4px 0 #0e1726;
    touch-action: none;
  }
  .control-btn:active, .control-btn.active {
    transform: translateY(3px);
    box-shadow: 0 1px 0 #0e1726;
    background: #294a7a;
  }
  #fireBtn {
    background: #8f1d1d;
    border-color: #ff5555;
    box-shadow: 0 4px 0 #4a0f0f;
  }
  .help {
    margin: 10px 0 0;
    font-size: 13px;
    color: #b9c7d9;
    line-height: 1.5;
  }
  @media (min-width: 900px) {
    .controls { max-width: 620px; margin-left: auto; margin-right: auto; }
  }
</style>
</head>
<body>
<div class="game-wrap">
  <h1>SPACE INVADER</h1>

  <div class="hud">
    <div>得点<br><span id="score">0</span></div>
    <div>最高得点<br><span id="highScore">0</span></div>
    <div>ステージ<br><span id="level">1</span></div>
    <div>残機<br><span id="lives">❤️❤️❤️</span></div>
  </div>

  <div class="canvas-box">
    <canvas id="game" width="900" height="600"></canvas>

    <div class="overlay" id="overlay">
      <div class="panel">
        <h2 id="messageTitle">スペースインベーダー</h2>
        <p id="messageText">
          パソコン：← → キーで移動、スペースキーで発射<br>
          スマートフォン：下のボタンで操作
        </p>
        <button id="startBtn">ゲームスタート</button>
      </div>
    </div>
  </div>

  <div class="controls">
    <button class="control-btn" id="leftBtn">◀</button>
    <button class="control-btn" id="rightBtn">▶</button>
    <button class="control-btn" id="fireBtn">🔥 発射</button>
  </div>

  <p class="help">
    敵をすべて倒すと次のステージへ進みます。UFOは高得点です。防護壁は弾が当たると少しずつ削れます。
  </p>
</div>

<script>
(() => {
  "use strict";

  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");

  const scoreEl = document.getElementById("score");
  const highScoreEl = document.getElementById("highScore");
  const levelEl = document.getElementById("level");
  const livesEl = document.getElementById("lives");
  const overlay = document.getElementById("overlay");
  const startBtn = document.getElementById("startBtn");
  const messageTitle = document.getElementById("messageTitle");
  const messageText = document.getElementById("messageText");

  const W = canvas.width;
  const H = canvas.height;

  let running = false;
  let animationId = null;
  let lastTime = 0;

  let score = 0;
  let highScore = Number(localStorage.getItem("spaceInvaderHighScore") || 0);
  let level = 1;
  let lives = 3;

  const keys = { left: false, right: false, fire: false };

  const player = {
    x: W / 2 - 28,
    y: H - 55,
    w: 56,
    h: 28,
    speed: 380,
    cooldown: 0
  };

  let playerBullets = [];
  let enemyBullets = [];
  let invaders = [];
  let barriers = [];
  let explosions = [];
  let particles = [];

  let invaderDirection = 1;
  let invaderSpeed = 36;
  let enemyShootTimer = 0;
  let ufo = null;
  let ufoTimer = 6;

  // ---- 簡易効果音（外部ファイル不要） ----
  let audioCtx = null;

  function ensureAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === "suspended") audioCtx.resume();
  }

  function beep(freq, duration, type = "square", volume = 0.05, slideTo = null) {
    ensureAudio();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    if (slideTo) {
      osc.frequency.exponentialRampToValueAtTime(slideTo, audioCtx.currentTime + duration);
    }
    gain.gain.setValueAtTime(volume, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
  }

  function soundShoot() { beep(680, 0.08, "square", 0.035, 320); }
  function soundEnemyHit() { beep(180, 0.12, "sawtooth", 0.055, 70); }
  function soundPlayerHit() {
    beep(120, 0.45, "sawtooth", 0.08, 35);
    setTimeout(() => beep(75, 0.25, "square", 0.04, 30), 80);
  }
  function soundUfo() { beep(850, 0.16, "sine", 0.05, 1200); }
  function soundLevelUp() {
    beep(440, 0.12, "square", 0.045);
    setTimeout(() => beep(660, 0.12, "square", 0.045), 130);
    setTimeout(() => beep(880, 0.18, "square", 0.045), 260);
  }

  function updateHud() {
    scoreEl.textContent = score;
    highScoreEl.textContent = highScore;
    levelEl.textContent = level;
    livesEl.textContent = lives > 0 ? "❤️".repeat(lives) : "0";
  }

  function resetPlayer() {
    player.x = W / 2 - player.w / 2;
    player.cooldown = 0;
    playerBullets = [];
    enemyBullets = [];
  }

  function createInvaders() {
    invaders = [];
    const rows = Math.min(4 + Math.floor((level - 1) / 2), 6);
    const cols = 10;
    const gapX = 64;
    const gapY = 46;
    const startX = 120;
    const startY = 90;

    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        invaders.push({
          x: startX + c * gapX,
          y: startY + r * gapY,
          w: 38,
          h: 26,
          row: r,
          alive: true,
          phase: (r + c) % 2
        });
      }
    }

    invaderDirection = 1;
    invaderSpeed = 34 + level * 8;
    enemyShootTimer = 0.8;
  }

  function createBarrierPattern() {
    const cells = [];
    const rows = 9;
    const cols = 15;

    for (let y = 0; y < rows; y++) {
      for (let x = 0; x < cols; x++) {
        let solid = true;

        // 上部の角を丸くする
        if (y === 0 && (x < 3 || x > 11)) solid = false;
        if (y === 1 && (x < 1 || x > 13)) solid = false;

        // 下中央をくり抜く
        if (y >= 5 && x >= 5 && x <= 9) solid = false;
        if (y >= 7 && x >= 4 && x <= 10) solid = false;

        if (solid) {
          cells.push({ x, y, hp: 3 });
        }
      }
    }
    return { rows, cols, cells };
  }

  function createBarriers() {
    barriers = [];
    const positions = [120, 310, 500, 690];

    for (const bx of positions) {
      const pattern = createBarrierPattern();
      barriers.push({
        x: bx,
        y: H - 165,
        cell: 5,
        cells: pattern.cells
      });
    }
  }

  function startGame() {
    ensureAudio();
    score = 0;
    level = 1;
    lives = 3;
    running = true;
    lastTime = performance.now();
    playerBullets = [];
    enemyBullets = [];
    explosions = [];
    particles = [];
    ufo = null;
    ufoTimer = 5;
    resetPlayer();
    createInvaders();
    createBarriers();
    updateHud();
    overlay.style.display = "none";

    cancelAnimationFrame(animationId);
    animationId = requestAnimationFrame(gameLoop);
  }

  function nextLevel() {
    running = false;
    soundLevelUp();
    level++;
    updateHud();

    messageTitle.textContent = "ステージクリア！";
    messageText.innerHTML = `ステージ ${level} へ進みます`;
    startBtn.textContent = "次のステージ";
    overlay.style.display = "flex";

    startBtn.onclick = () => {
      running = true;
      resetPlayer();
      createInvaders();
      createBarriers();
      ufo = null;
      ufoTimer = Math.max(3, 7 - level * 0.25);
      overlay.style.display = "none";
      lastTime = performance.now();
      animationId = requestAnimationFrame(gameLoop);
    };
  }

  function gameOver() {
    running = false;
    if (score > highScore) {
      highScore = score;
      localStorage.setItem("spaceInvaderHighScore", String(highScore));
    }
    updateHud();

    messageTitle.textContent = "ゲームオーバー";
    messageText.innerHTML = `得点：${score}<br>最高得点：${highScore}`;
    startBtn.textContent = "もう一度遊ぶ";
    overlay.style.display = "flex";
    startBtn.onclick = startGame;
  }

  function addExplosion(x, y, size = 22, color = "#ffbd3b") {
    explosions.push({ x, y, life: 0.35, maxLife: 0.35, size, color });

    for (let i = 0; i < 12; i++) {
      const a = Math.random() * Math.PI * 2;
      const s = 40 + Math.random() * 150;
      particles.push({
        x, y,
        vx: Math.cos(a) * s,
        vy: Math.sin(a) * s,
        life: 0.35 + Math.random() * 0.35,
        size: 2 + Math.random() * 4
      });
    }
  }

  function rectsHit(a, b) {
    return a.x < b.x + b.w &&
           a.x + a.w > b.x &&
           a.y < b.y + b.h &&
           a.y + a.h > b.y;
  }

  function shootPlayer() {
    if (!running || player.cooldown > 0) return;
    playerBullets.push({
      x: player.x + player.w / 2 - 3,
      y: player.y - 10,
      w: 6,
      h: 16,
      speed: 620
    });
    player.cooldown = 0.24;
    soundShoot();
  }

  function shootEnemy() {
    const alive = invaders.filter(i => i.alive);
    if (!alive.length) return;

    // 各列の一番下の敵から発射
    const bottomByColumn = new Map();
    for (const inv of alive) {
      const col = Math.round((inv.x - 120) / 64);
      const old = bottomByColumn.get(col);
      if (!old || inv.y > old.y) bottomByColumn.set(col, inv);
    }

    const shooters = [...bottomByColumn.values()];
    const shooter = shooters[Math.floor(Math.random() * shooters.length)];
    enemyBullets.push({
      x: shooter.x + shooter.w / 2 - 3,
      y: shooter.y + shooter.h,
      w: 6,
      h: 16,
      speed: 220 + level * 24
    });
  }

  function damageBarrierByBullet(bullet) {
    for (const barrier of barriers) {
      for (const cell of barrier.cells) {
        if (cell.hp <= 0) continue;
        const cellRect = {
          x: barrier.x + cell.x * barrier.cell,
          y: barrier.y + cell.y * barrier.cell,
          w: barrier.cell,
          h: barrier.cell
        };
        if (rectsHit(bullet, cellRect)) {
          cell.hp--;
          addExplosion(bullet.x, bullet.y, 7, "#83ff83");
          return true;
        }
      }
    }
    return false;
  }

  function invadersTouchBarriers() {
    for (const inv of invaders) {
      if (!inv.alive) continue;
      for (const barrier of barriers) {
        for (const cell of barrier.cells) {
          if (cell.hp <= 0) continue;
          const cellRect = {
            x: barrier.x + cell.x * barrier.cell,
            y: barrier.y + cell.y * barrier.cell,
            w: barrier.cell,
            h: barrier.cell
          };
          if (rectsHit(inv, cellRect)) cell.hp = 0;
        }
      }
    }
  }

  function playerHit() {
    lives--;
    soundPlayerHit();
    addExplosion(player.x + player.w / 2, player.y + player.h / 2, 34, "#ff4c4c");
    updateHud();

    if (lives <= 0) {
      setTimeout(gameOver, 500);
    } else {
      resetPlayer();
    }
  }

  function spawnUfo() {
    const fromLeft = Math.random() < 0.5;
    ufo = {
      x: fromLeft ? -70 : W + 10,
      y: 40,
      w: 62,
      h: 24,
      speed: (110 + level * 8) * (fromLeft ? 1 : -1)
    };
  }

  function update(dt) {
    if (!running) return;

    player.cooldown -= dt;

    if (keys.left) player.x -= player.speed * dt;
    if (keys.right) player.x += player.speed * dt;
    player.x = Math.max(8, Math.min(W - player.w - 8, player.x));

    if (keys.fire) shootPlayer();

    for (const b of playerBullets) b.y -= b.speed * dt;
    for (const b of enemyBullets) b.y += b.speed * dt;

    // 敵全体の移動
    const alive = invaders.filter(i => i.alive);
    if (alive.length) {
      const left = Math.min(...alive.map(i => i.x));
      const right = Math.max(...alive.map(i => i.x + i.w));

      let dx = invaderDirection * invaderSpeed * dt;
      if ((right + dx > W - 24 && invaderDirection > 0) ||
          (left + dx < 24 && invaderDirection < 0)) {
        invaderDirection *= -1;
        for (const inv of alive) inv.y += 20;
        dx = 0;
        invaderSpeed += 2;
      }

      for (const inv of alive) inv.x += dx;

      if (alive.some(i => i.y + i.h >= player.y - 8)) {
        gameOver();
        return;
      }
    }

    invadersTouchBarriers();

    enemyShootTimer -= dt;
    if (enemyShootTimer <= 0) {
      shootEnemy();
      enemyShootTimer = Math.max(0.25, 1.2 - level * 0.06) * (0.65 + Math.random() * 0.8);
    }

    // UFO
    ufoTimer -= dt;
    if (!ufo && ufoTimer <= 0) {
      spawnUfo();
      ufoTimer = 9 + Math.random() * 8;
    }
    if (ufo) {
      ufo.x += ufo.speed * dt;
      if (ufo.x < -100 || ufo.x > W + 100) ufo = null;
    }

    // プレイヤー弾の判定
    for (let bi = playerBullets.length - 1; bi >= 0; bi--) {
      const b = playerBullets[bi];
      let removed = false;

      if (b.y + b.h < 0) {
        playerBullets.splice(bi, 1);
        continue;
      }

      if (damageBarrierByBullet(b)) {
        playerBullets.splice(bi, 1);
        continue;
      }

      if (ufo && rectsHit(b, ufo)) {
        const points = [100, 150, 200, 300][Math.floor(Math.random() * 4)];
        score += points;
        if (score > highScore) highScore = score;
        addExplosion(ufo.x + ufo.w / 2, ufo.y + ufo.h / 2, 32, "#ff4c4c");
        soundUfo();
        ufo = null;
        playerBullets.splice(bi, 1);
        updateHud();
        continue;
      }

      for (const inv of invaders) {
        if (inv.alive && rectsHit(b, inv)) {
          inv.alive = false;
          score += inv.row === 0 ? 30 : inv.row <= 2 ? 20 : 10;
          if (score > highScore) highScore = score;
          addExplosion(inv.x + inv.w / 2, inv.y + inv.h / 2, 24, "#ffd34d");
          soundEnemyHit();
          playerBullets.splice(bi, 1);
          updateHud();
          removed = true;
          break;
        }
      }
      if (removed) continue;
    }

    // 敵弾の判定
    for (let bi = enemyBullets.length - 1; bi >= 0; bi--) {
      const b = enemyBullets[bi];

      if (b.y > H) {
        enemyBullets.splice(bi, 1);
        continue;
      }

      if (damageBarrierByBullet(b)) {
        enemyBullets.splice(bi, 1);
        continue;
      }

      if (rectsHit(b, player)) {
        enemyBullets.splice(bi, 1);
        playerHit();
        if (!running) return;
      }
    }

    // 爆発と粒子
    for (const e of explosions) e.life -= dt;
    explosions = explosions.filter(e => e.life > 0);

    for (const p of particles) {
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vx *= 0.97;
      p.vy *= 0.97;
      p.life -= dt;
    }
    particles = particles.filter(p => p.life > 0);

    if (invaders.every(i => !i.alive)) {
      nextLevel();
    }
  }

  function drawPlayer() {
    ctx.save();
    ctx.translate(player.x, player.y);

    ctx.fillStyle = "#69f0ff";
    ctx.fillRect(0, 16, player.w, 10);
    ctx.fillRect(8, 10, player.w - 16, 10);
    ctx.fillRect(21, 0, 14, 16);

    ctx.fillStyle = "#d8ffff";
    ctx.fillRect(25, 3, 6, 8);
    ctx.restore();
  }

  function drawInvader(inv, time) {
    const blink = Math.floor(time / 350 + inv.phase) % 2;
    ctx.save();
    ctx.translate(inv.x, inv.y);
    ctx.fillStyle = inv.row === 0 ? "#ff6bff" : inv.row <= 2 ? "#6ef7ff" : "#7cff6b";

    // ピクセル風インベーダー
    const s = 4;
    const patternA = [
      "00100100",
      "00011000",
      "00111100",
      "01111110",
      "11111111",
      "10111101",
      "10000001",
      blink ? "01000010" : "00100100"
    ];
    for (let y = 0; y < patternA.length; y++) {
      for (let x = 0; x < patternA[y].length; x++) {
        if (patternA[y][x] === "1") ctx.fillRect(x * s, y * 3, s, 3);
      }
    }
    ctx.restore();
  }

  function drawUfo() {
    if (!ufo) return;
    ctx.save();
    ctx.translate(ufo.x, ufo.y);
    ctx.fillStyle = "#ff4444";
    ctx.fillRect(8, 8, 46, 12);
    ctx.fillRect(16, 3, 30, 6);
    ctx.fillRect(0, 13, 62, 7);
    ctx.fillStyle = "#fff08a";
    for (let i = 0; i < 5; i++) ctx.fillRect(8 + i * 11, 16, 5, 3);
    ctx.restore();
  }

  function drawBarriers() {
    for (const barrier of barriers) {
      for (const cell of barrier.cells) {
        if (cell.hp <= 0) continue;
        ctx.fillStyle =
          cell.hp === 3 ? "#53ff68" :
          cell.hp === 2 ? "#2dcc49" : "#178c31";
        ctx.fillRect(
          barrier.x + cell.x * barrier.cell,
          barrier.y + cell.y * barrier.cell,
          barrier.cell,
          barrier.cell
        );
      }
    }
  }

  function drawBullets() {
    ctx.fillStyle = "#fff45c";
    for (const b of playerBullets) ctx.fillRect(b.x, b.y, b.w, b.h);

    ctx.fillStyle = "#ff5e5e";
    for (const b of enemyBullets) {
      ctx.fillRect(b.x, b.y, b.w, b.h);
      ctx.fillRect(b.x - 2, b.y + 4, b.w + 4, 4);
    }
  }

  function drawExplosions() {
    for (const e of explosions) {
      const t = 1 - e.life / e.maxLife;
      const r = e.size * (0.35 + t);
      ctx.save();
      ctx.globalAlpha = Math.max(0, e.life / e.maxLife);
      ctx.fillStyle = e.color;
      ctx.beginPath();
      ctx.arc(e.x, e.y, r, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    ctx.fillStyle = "#fff";
    for (const p of particles) {
      ctx.globalAlpha = Math.max(0, p.life);
      ctx.fillRect(p.x, p.y, p.size, p.size);
    }
    ctx.globalAlpha = 1;
  }

  function drawGround() {
    ctx.strokeStyle = "#1dff5a";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, H - 18);
    ctx.lineTo(W, H - 18);
    ctx.stroke();
  }

  function draw(time) {
    ctx.clearRect(0, 0, W, H);

    drawUfo();
    drawBarriers();

    for (const inv of invaders) {
      if (inv.alive) drawInvader(inv, time);
    }

    drawPlayer();
    drawBullets();
    drawExplosions();
    drawGround();
  }

  function gameLoop(time) {
    if (!running) return;

    const dt = Math.min(0.033, (time - lastTime) / 1000);
    lastTime = time;

    update(dt);
    draw(time);

    if (running) animationId = requestAnimationFrame(gameLoop);
  }

  // ---- キーボード ----
  window.addEventListener("keydown", e => {
    if (["ArrowLeft", "ArrowRight", "Space"].includes(e.code)) e.preventDefault();
    if (e.code === "ArrowLeft") keys.left = true;
    if (e.code === "ArrowRight") keys.right = true;
    if (e.code === "Space") {
      keys.fire = true;
      shootPlayer();
    }
  });

  window.addEventListener("keyup", e => {
    if (e.code === "ArrowLeft") keys.left = false;
    if (e.code === "ArrowRight") keys.right = false;
    if (e.code === "Space") keys.fire = false;
  });

  // ---- スマホ・マウス操作 ----
  function bindHoldButton(id, keyName, onPress = null) {
    const btn = document.getElementById(id);

    const press = e => {
      e.preventDefault();
      ensureAudio();
      keys[keyName] = true;
      btn.classList.add("active");
      if (onPress) onPress();
    };

    const release = e => {
      e.preventDefault();
      keys[keyName] = false;
      btn.classList.remove("active");
    };

    btn.addEventListener("pointerdown", press);
    btn.addEventListener("pointerup", release);
    btn.addEventListener("pointercancel", release);
    btn.addEventListener("pointerleave", release);
  }

  bindHoldButton("leftBtn", "left");
  bindHoldButton("rightBtn", "right");
  bindHoldButton("fireBtn", "fire", shootPlayer);

  startBtn.onclick = startGame;

  // 初期表示
  highScoreEl.textContent = highScore;
  updateHud();
  draw(0);
})();
</script>
</body>
</html>
